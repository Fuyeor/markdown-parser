# .github/workflows/ci.yml
name: Build and Push Playground

on:
  push:
    branches: [ "main" ]
    # Only trigger when relevant code changes to save resources 
    paths:
      - "packages/markdown-parser/src"
      - "packages/markdown-parser-lit/src"
      - "packages/playground/**"
      - "Dockerfile"
  workflow_dispatch:
    # Allow manual trigger

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: fuyeor/flavored-front-end

jobs:
  build-markdown-playground:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # Tags: latest and the short commit hash
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          # Enable GitHub Actions native cache
          cache-from: type=gha
          cache-to: type=gha,mode=max
